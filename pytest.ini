[pytest]
# Limit test discovery to ./tests/ — prevent duplicate-module-name
# collisions from REVIEW_PACKAGE/tests/ and AI_HANDOFF_PACKAGE/tests/
# mirror directories. Live tests source is ALWAYS ./tests/.
testpaths = tests
norecursedirs = REVIEW_PACKAGE AI_HANDOFF_PACKAGE .git build dist *.egg-info
asyncio_mode = strict

# Phase-19 (ChatGPT-08:49 #1 + #2): test-gate markers
#   smoke       — <60s preflight, every loop tick
#   critical    — P0 invariants, must pass before any commit / deploy
#   integration — cross-module / file-I/O / subprocess
#   slow        — replay/regression/backtest heavyweights (multi-second each)
#   full        — release gate; runs everything including slow
#
# run_quality_gates.py --fast SHOULD select `smoke or critical` and
# de-select `slow` so a Claude-loop tick stays under a minute.
markers =
    smoke: very fast preflight tests, run on every loop tick
    critical: P0 invariants that must pass before any commit/merge/deploy
    integration: cross-module tests (subprocess / file I/O / fake-broker scenarios)
    slow: heavy replay/backtest/regression tests (multi-second each)
    full: release-gate; only run before a live-trading start or major refactor
