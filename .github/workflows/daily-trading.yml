name: Daily Cameron-Bot Trading

# Phase-83 (2026-05-19): cloud deployment with force-mode + ntfy.
# User requested cloud trading because home internet may go down.
# Workflow runs Mo-Fr automatically, force-mode = max trades, all logs
# uploaded as artifacts, ntfy pushes to user's phone.

on:
  schedule:
    # Phase-87 (2026-05-21): MULTIPLE cron entries for redundancy.
    # GitHub Actions free-tier delays scheduled triggers up to 7+ hours
    # under load (confirmed 2026-05-20: cron set to 13:23 UTC actually
    # fired at 20:59 UTC = 7h36m late → bot started after market close).
    # By firing 4 times before/during NY market hours, at least ONE
    # should hit close to the intended time. The bot's process-lock
    # prevents duplicate trading; only the first one to acquire bot.pid
    # actually trades, others see the lock and exit gracefully.
    - cron: '23 13 * * 1-5'   # 15:23 Berlin = 09:23 ET = primary, 7m pre-market
    - cron: '47 14 * * 1-5'   # 16:47 Berlin = 10:47 ET = backup 1h17m into mkt
    - cron: '23 16 * * 1-5'   # 18:23 Berlin = 12:23 ET = backup mid-day
    - cron: '47 17 * * 1-5'   # 19:47 Berlin = 13:47 ET = backup late-mkt
    # Off-the-half-hour minute (3/7/23/47) avoids the top-of-hour
    # server-load spike where GitHub queues scheduled triggers most.
  workflow_dispatch:
    inputs:
      strategy_variant:
        description: "Strategy variant (strict|relaxed|loose|ultra|force)"
        required: false
        default: "ultra"
      skip_hard_flat:
        description: "Skip HARD_FLAT (allow afternoon trading) — 0 or 1"
        required: false
        default: "1"

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h, GitHub-Max

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Quick tests (smoke)
        run: |
          python -m pytest tests/ -q \
            --ignore=tests/test_replay_regression.py \
            --ignore=tests/test_pilot_baseline.py \
            --deselect tests/test_deploy_safe_bugs.py::test_kill_bot_uses_sigterm_first
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}

      - name: Startup ntfy — confirm cloud bot armed
        # Phase-88 (2026-05-21) BUG FIX: the previous `if: env.NTFY_TOPIC
        # != ''` was ALWAYS FALSE because step-level env is NOT available
        # to step-level `if:` (GitHub Actions evaluation order). Result:
        # NO startup push EVER fired in 3 days of cloud runs. Now use
        # secrets directly in the `if:` and inline in the command.
        if: ${{ secrets.NTFY_TOPIC != '' }}
        run: |
          STRATEGY="${{ github.event.inputs.strategy_variant || 'ultra' }}"
          SKIP="${{ github.event.inputs.skip_hard_flat || '1' }}"
          curl -s -H "Title: GitHub Cloud — bot starting" \
               -H "Priority: default" \
               -d "Run ${{ github.run_id }} armed. Mode=$STRATEGY skip_hard_flat=$SKIP. NY-open 13:30 UTC. EOD ntfy ~21:55 Berlin." \
               "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}" || true

      - name: Run bot in daemon mode (loose-mode full-day trading)
        timeout-minutes: 340
        continue-on-error: true
        run: |
          cd 06_live_bot
          # Phase-85: loose mode = real Cameron pattern with relaxed
          # thresholds. Full day trading via SKIP_HARD_FLAT_TODAY=1.
          python -u bot.py --daemon
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          # Phase-86 (2026-05-21): switch default to ULTRA mode based on
          # 3-month backtest results:
          #   strict   174 trades  $+2,742  PF 2.01
          #   moderate 236 trades  $+4,202  PF 2.19
          #   loose    244 trades  $+4,354  PF 2.19
          #   ULTRA   1885 trades  $+18,399 PF 1.63   <- 4x more PnL!
          # ultra = Phase-72 thresholds (pole 1%, retrace 90%, vol 1.0x,
          # VWAP/MACD/FBO vetos disabled). ~20 trades/day vs ~3 in loose.
          STRATEGY_VARIANT: ${{ github.event.inputs.strategy_variant || 'ultra' }}
          SKIP_HARD_FLAT_TODAY: ${{ github.event.inputs.skip_hard_flat || '1' }}
          # ntfy push — user-controlled topic via GitHub Secret
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TZ: UTC

      - name: Upload bot logs + results (ALL artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-run-${{ github.run_id }}
          path: |
            06_live_bot/daemon.log
            06_live_bot/bot.log
            06_live_bot/bot.log.*
            06_live_bot/alerts.log
            06_live_bot/results/
            06_live_bot/trades_live.jsonl
            06_live_bot/slippage.jsonl
            06_live_bot/status.json
            06_live_bot/watchlist_today.json
            06_live_bot/order_lifecycle.jsonl
            06_live_bot/market_data_calls.jsonl
            06_live_bot/alpaca_api_calls.jsonl
            06_live_bot/no_trade_postmortem_*.json
          retention-days: 30
          if-no-files-found: warn

      - name: Summary in Action-UI
        if: always()
        run: |
          echo "## Trading-Day Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Strategy:** ${{ github.event.inputs.strategy_variant || 'force' }}" >> $GITHUB_STEP_SUMMARY
          echo "**SKIP_HARD_FLAT:** ${{ github.event.inputs.skip_hard_flat || '1' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Phase-83: trade summary from bot.log
          if [ -f 06_live_bot/bot.log ]; then
            echo "### Trade Activity (BUYs / FILLs / POS-*)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "(FORCE-ENTRY|BRACKET-BUY .*FILLED|POS-OPEN|POS-CLOSE|TP-TRIGGER|STOP-TRIGGER|HARD FLAT|EOD:)" 06_live_bot/bot.log | tail -50 >> $GITHUB_STEP_SUMMARY || echo "(no trade events)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Trade-event counts" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "FORCE-ENTRY: $(grep -c FORCE-ENTRY 06_live_bot/bot.log)" >> $GITHUB_STEP_SUMMARY
            echo "FILLED:      $(grep -c 'FILLED @' 06_live_bot/bot.log)" >> $GITHUB_STEP_SUMMARY
            echo "POS-OPEN:    $(grep -c POS-OPEN 06_live_bot/bot.log)" >> $GITHUB_STEP_SUMMARY
            echo "POS-CLOSE:   $(grep -c POS-CLOSE 06_live_bot/bot.log)" >> $GITHUB_STEP_SUMMARY
            echo "ERRORS:      $(grep -c ' ERROR ' 06_live_bot/bot.log)" >> $GITHUB_STEP_SUMMARY
            echo "CRITICAL:    $(grep -c CRITICAL 06_live_bot/bot.log)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          # ntfy push the summary to user's phone (Phase-83 + Phase-88 fix)
          # Phase-88: inline-secret in bash if-test — works regardless of
          # whether step-level env block evaluates secrets in time.
          NTFY_T="${{ secrets.NTFY_TOPIC }}"
          if [ -n "$NTFY_T" ]; then
            FORCE_COUNT=$(grep -c FORCE-ENTRY 06_live_bot/bot.log 2>/dev/null || echo 0)
            FILLED_COUNT=$(grep -c 'FILLED @' 06_live_bot/bot.log 2>/dev/null || echo 0)
            BUY_COUNT=$(grep -c 'BRACKET-BUY.*FILLED' 06_live_bot/bot.log 2>/dev/null || echo 0)
            ERR_COUNT=$(grep -c ' ERROR ' 06_live_bot/bot.log 2>/dev/null || echo 0)
            CRIT_COUNT=$(grep -c ' CRITICAL ' 06_live_bot/bot.log 2>/dev/null || echo 0)
            curl -s -H "Title: GitHub Cloud Day Summary" \
                 -d "force_entries=$FORCE_COUNT  filled=$FILLED_COUNT  BUYs=$BUY_COUNT  errors=$ERR_COUNT  critical=$CRIT_COUNT — see workflow run for full log" \
                 "https://ntfy.sh/$NTFY_T" || true
          fi
