name: Daily Cameron-Bot Trading

# 100% kostenlose Cloud-Lösung via GitHub Actions.
# Läuft Mo–Fr automatisch von 12:00 CEST bis ~18:05 CEST (~6h).
# Deckt das komplette Cameron-Trading-Window: Premarket-Scan 12:27,
# Market-Open 15:30, HARD_FLAT 18:00.
#
# Limits:
#   - Free Tier: 2000 min/Monat für private Repos, UNLIMITED für public.
#   - Job-Timeout: max 6h pro Run.
#   - Position-State zwischen Days: nicht persistent (container ephemeral).
#     Aber das ist OK — Bot startet jeden Tag clean, HARD_FLAT schließt
#     alle Positions am Vortag.

on:
  schedule:
    # 10:00 UTC = 12:00 CEST (Sommerzeit) = 11:00 CET (Winterzeit)
    # 5–10 Min Buffer vor Pre-Market-Scan-Start
    - cron: '0 10 * * 1-5'
  workflow_dispatch:    # erlaubt manuellen Trigger via UI

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h, GitHub-Max

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Quick tests (smoke)
        run: |
          python -m pytest --ignore=tests/test_replay_regression.py \
                            --ignore=tests/test_pilot_baseline.py -q
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}

      - name: Run bot in daemon mode (timeout-bounded)
        timeout-minutes: 340     # bot läuft 5h40min, dann clean exit
        continue-on-error: true   # damit artifacts trotzdem uploaded werden
        run: |
          cd 06_live_bot
          # Bot startet, schläft bis Pre-Market (12:27 CEST = ~27min),
          # tradet bis HARD_FLAT 12:00 ET = 18:00 CEST, dann loop to sleep
          # → wird durch timeout-minutes oben sauber gekillt
          python -u bot.py --daemon
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          TZ: UTC

      - name: Upload bot logs + results
        if: always()    # auch bei timeout
        uses: actions/upload-artifact@v4
        with:
          name: bot-run-${{ github.run_id }}
          path: |
            06_live_bot/daemon.log
            06_live_bot/bot.log
            06_live_bot/results/
            06_live_bot/trades_live.jsonl
            06_live_bot/slippage.jsonl
            06_live_bot/status.json
            06_live_bot/watchlist_today.json
          retention-days: 30
          if-no-files-found: warn

      - name: Summary in Action-UI
        if: always()
        run: |
          echo "## Trading-Day Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f 06_live_bot/daemon.log ]; then
            echo "### Day-Summary aus daemon.log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -A 15 "DAY SUMMARY" 06_live_bot/daemon.log | tail -20 >> $GITHUB_STEP_SUMMARY || echo "(no summary)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f 06_live_bot/results/*.json ]; then
            echo "### Results JSON" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat 06_live_bot/results/*.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
